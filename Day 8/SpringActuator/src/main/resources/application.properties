spring.application.name=SpringActuator
server.port = 8082

#Enable actuator endpoint
management.endpoints.web.exposure.include=health,info,metrics

#Add App Info
management.info.env.enabled = true
info.app.name = Actuator Demo App
info.app.version = 1.0
info.app.description = This is a demo application to show Spring Boot Actuator features.