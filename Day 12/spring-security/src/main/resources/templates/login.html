<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 100%;
            max-width: 360px;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
        }
        h1 {
            margin-top: 0;
            text-align: center;
            font-size: 24px;
        }
        p {
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            border: 0;
            border-radius: 8px;
            background: #2563eb;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }
        .message {
            margin-bottom: 16px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .error {
            background: #fee2e2;
            color: #b91c1c;
        }
        .success {
            background: #dcfce7;
            color: #166534;
        }
        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #475569;
        }
        code {
            background: #eef2ff;
            padding: 2px 6px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Login</h1>

    <div th:if="${param.error}" class="message error">
        Invalid username or password.
    </div>

    <div th:if="${param.logout}" class="message success">
        You have been logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input id="username" type="text" name="username" placeholder="Enter username" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Sign in</button>
    </form>

    <p class="hint">
        Admin login: <code>admin</code> / <code>admin</code><br>
        User login: <code>user</code> / <code>password</code>
    </p>
</div>
</body>
</html>
