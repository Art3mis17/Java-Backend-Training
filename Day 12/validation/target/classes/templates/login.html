<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .container { max-width: 420px; }
        .field { margin-bottom: 1rem; }
        .error { color: #b00020; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; }
        button { padding: 0.6rem 1rem; }
    </style>
</head>
<body>
<div class="container">
    <h2>Login</h2>
    <form th:action="@{/login}" th:object="${loginForm}" method="post">
        <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" th:field="*{username}" placeholder="Only letters" />
            <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}" placeholder="1 uppercase, 1 number, 1 symbol" />
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
